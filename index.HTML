<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Kurt POS - IndexedDB Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --accent: #00ff88; --text: #eee; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Layout */
        header { padding: 15px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        @media (max-width: 768px) { .main-container { flex-direction: column; } }

        .pane { flex: 1; padding: 15px; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow-y: auto; }
        #reader { width: 100%; border-radius: 12px; background: #000; border: 1px solid var(--border); }

        /* Cart */
        .cart-item { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #222; }
        .total-box { font-size: 1.8rem; margin: 20px 0; color: var(--accent); font-weight: bold; text-align: right; }

        /* Forms & Modals */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 25px; width: 85%; max-width: 350px; border-radius: 15px; border: 1px solid var(--accent); }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #000; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid #555; color: #888; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: var(--accent);">MK FOOD HUB</div>
    <button class="btn" style="background:#222; color:#fff; padding: 8px 15px;" onclick="openModal()">+ Add Product</button>
</header>

<div class="main-container">
    <div class="pane">
        <div id="reader"></div>
        <div id="scan-status" style="margin-top:15px; text-align:center; color:#666;">Waiting for scan...</div>
    </div>

    <div class="pane">
        <h3 style="margin-top:0">Order Details</h3>
        <div id="cart-list" style="flex:1"></div>
        <div class="total-box">₱<span id="total-val">0.00</span></div>
        <button class="btn btn-primary" onclick="checkout()">COMPLETE SALE</button>
        <button class="btn btn-outline" style="border:none" onclick="clearCart()">Reset Order</button>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0; color:var(--accent)">New Item</h2>
        <p style="font-size:0.8rem; color:#888">Scan barcode to auto-fill</p>
        <input type="text" id="in-barcode" placeholder="Barcode ID">
        <input type="text" id="in-name" placeholder="Item Name">
        <input type="number" id="in-price" placeholder="Price (₱)">
        <button class="btn btn-primary" onclick="saveToDB()">SAVE TO SYSTEM</button>
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
let db;
let cart = [];
const scanner = new Html5Qrcode("reader");
const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/701/701-preview.mp3');

// 1. Initialize IndexedDB
const dbReq = indexedDB.open("MK_POS_DB", 1);

dbReq.onupgradeneeded = (e) => {
    db = e.target.result;
    if (!db.objectStoreNames.contains("products")) {
        db.createObjectStore("products", { keyPath: "barcode" });
    }
};

dbReq.onsuccess = (e) => { db = e.target.result; };

// 2. Scanner Implementation
const onScanSuccess = (barcode) => {
    // If modal is open, just fill the barcode input
    if (document.getElementById('addModal').style.display === 'block') {
        document.getElementById('in-barcode').value = barcode;
        if (navigator.vibrate) navigator.vibrate(50);
        return;
    }

    // Otherwise, search DB and add to cart
    searchProduct(barcode);
};

function searchProduct(barcode) {
    const tx = db.transaction("products", "readonly");
    const store = tx.objectStore("products");
    const request = store.get(barcode);

    request.onsuccess = () => {
        if (request.result) {
            cart.push(request.result);
            renderCart();
            if (navigator.vibrate) navigator.vibrate(100);
            beep.play();
            
            // Anti-spam pause
            scanner.pause(true);
            setTimeout(() => scanner.resume(), 1200);
        } else {
            console.log("Not found:", barcode);
            document.getElementById('scan-status').innerText = "Unregistered Item: " + barcode;
        }
    };
}

// 3. Database Writing
function saveToDB() {
    const barcode = document.getElementById('in-barcode').value;
    const name = document.getElementById('in-name').value;
    const price = parseFloat(document.getElementById('in-price').value);

    if (!barcode || !name || isNaN(price)) return alert("Missing info!");

    const tx = db.transaction("products", "readwrite");
    const store = tx.objectStore("products");
    
    store.put({ barcode, name, price });

    tx.oncomplete = () => {
        closeModal();
        document.getElementById('scan-status').innerText = "Product Saved!";
        // Clear inputs
        document.getElementById('in-barcode').value = '';
        document.getElementById('in-name').value = '';
        document.getElementById('in-price').value = '';
    };
}

// 4. UI Functions
function renderCart() {
    const list = document.getElementById('cart-list');
    const totalEl = document.getElementById('total-val');
    list.innerHTML = '';
    let total = 0;

    cart.forEach(item => {
        total += item.price;
        list.innerHTML += `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>₱${item.price.toFixed(2)}</span>
            </div>
        `;
    });
    totalEl.innerText = total.toFixed(2);
    document.getElementById('scan-status').innerText = "Item Added!";
}

function checkout() {
    if (cart.length === 0) return;
    alert(`Success! Total: ₱${document.getElementById('total-val').innerText}`);
    clearCart();
}

function clearCart() { cart = []; renderCart(); }
function openModal() { document.getElementById('addModal').style.display = 'block'; }
function closeModal() { document.getElementById('addModal').style.display = 'none'; }

// 5. Start Camera
scanner.start(
    { facingMode: "environment" }, 
    { fps: 15, qrbox: { width: 250, height: 150 } }, 
    onScanSuccess
).catch(err => alert("Camera error: " + err));
</script>
</body>
</html>
